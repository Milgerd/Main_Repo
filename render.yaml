databases:
  - name: launchforge-db
    plan: free
    databaseName: launchforge
    user: launchforge_user

services:
  - type: keyvalue
    name: launchforge-redis
    plan: free
    ipAllowList: []

  - type: web
    name: launchforge-api
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: launchforge-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: launchforge-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: launchforge-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: launchforge-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: launchforge-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://launchforge-frontend.onrender.com
      - key: REDIS_HOST
        fromService:
          name: launchforge-redis
          type: keyvalue
          property: host
      - key: REDIS_PORT
        fromService:
          name: launchforge-redis
          type: keyvalue
          property: port

  - type: web
    name: launchforge-frontend
    runtime: static
    plan: starter
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    rootDir: client
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://launchforge-api.onrender.com
