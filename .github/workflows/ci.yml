name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: launchforge_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    # Test-only credentials for the ephemeral PostgreSQL CI service.
    # These are not production secrets.
    # Production/deployment secrets must use GitHub Actions Secrets.
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: launchforge_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ci-test-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create database tables
        run: |
          psql -h localhost -U postgres -d launchforge_test <<'SQL'
          CREATE TABLE IF NOT EXISTS users (
            id SERIAL PRIMARY KEY,
            email VARCHAR UNIQUE NOT NULL,
            password VARCHAR NOT NULL,
            role VARCHAR NOT NULL DEFAULT 'user'
          );
          CREATE TABLE IF NOT EXISTS role_audit_log (
            id SERIAL PRIMARY KEY,
            admin_id INTEGER NOT NULL,
            target_user_id INTEGER NOT NULL,
            old_role VARCHAR NOT NULL,
            new_role VARCHAR NOT NULL,
            created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
          );
          CREATE TABLE IF NOT EXISTS projects (
            id SERIAL PRIMARY KEY,
            user_id INTEGER NOT NULL REFERENCES users(id),
            name VARCHAR(100) NOT NULL,
            description TEXT,
            status VARCHAR(20) NOT NULL DEFAULT 'draft',
            created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
          );
          CREATE INDEX IF NOT EXISTS idx_projects_user_id ON projects(user_id);
          CREATE TABLE IF NOT EXISTS project_activity (
            id SERIAL PRIMARY KEY,
            user_id INTEGER NOT NULL REFERENCES users(id),
            project_id INTEGER NOT NULL REFERENCES projects(id),
            event_type VARCHAR(50) NOT NULL,
            created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
          );
          CREATE INDEX IF NOT EXISTS idx_project_activity_project_id ON project_activity(project_id);
          CREATE TABLE IF NOT EXISTS tasks (
            id SERIAL PRIMARY KEY,
            project_id INTEGER NOT NULL REFERENCES projects(id),
            user_id INTEGER NOT NULL REFERENCES users(id),
            title VARCHAR(200) NOT NULL,
            description TEXT,
            status VARCHAR(20) NOT NULL DEFAULT 'open',
            due_date DATE,
            created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
          );
          CREATE INDEX IF NOT EXISTS idx_tasks_project_id ON tasks(project_id);
          SQL
        env:
          PGPASSWORD: postgres

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand --passWithNoTests

      - name: Install frontend dependencies
        run: npm ci
        working-directory: client

      - name: Build frontend
        run: npm run build
        working-directory: client

      - name: Build Docker image
        run: docker build -t launchforge-backend .
